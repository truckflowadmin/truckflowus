services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: truckflow
      POSTGRES_PASSWORD: truckflow
      POSTGRES_DB: truckflow
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U truckflow']
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '3000:3000'
    environment:
      DATABASE_URL: 'postgresql://truckflow:truckflow@db:5432/truckflow?schema=public'
      JWT_SECRET: '${JWT_SECRET:-change-me-to-a-random-string}'
      APP_URL: '${APP_URL:-http://localhost:3000}'
      TEXTBELT_KEY: '${TEXTBELT_KEY:-textbelt_test}'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/api/health']
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata:
